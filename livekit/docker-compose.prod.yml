# Meallion Voice AI - Production Docker Compose
# Deploy on Hetzner with Caddy for automatic SSL

services:
  # Caddy reverse proxy - handles SSL automatically (Let's Encrypt)
  caddy:
    image: caddy:2-alpine
    container_name: meallion-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
      # Serve built frontend and admin static files
      - frontend-build:/srv/frontend:ro
      - admin-build:/srv/admin:ro
    networks:
      - meallion-network
    restart: unless-stopped
    depends_on:
      - api

  # Main FastAPI application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meallion-api
    expose:
      - "8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - DEBUG=false
      - LOG_LEVEL=INFO
      - LIVEKIT_URL=ws://livekit:7880
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - LIVEKIT_PUBLIC_URL=${LIVEKIT_PUBLIC_URL}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID:-aTP4J5SJLQl74WTSRXKW}
      - ELEVENLABS_MODEL=${ELEVENLABS_MODEL:-eleven_multilingual_v2}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - SHOPIFY_STORE_URL=${SHOPIFY_STORE_URL}
      - SHOPIFY_ACCESS_TOKEN=${SHOPIFY_ACCESS_TOKEN}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SUPPORT_EMAIL=${SUPPORT_EMAIL:-support@meallion.com}
      - DATABASE_URL=sqlite+aiosqlite:///./data/conversations.db
      - POSTGRES_URL=${POSTGRES_URL}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET}
      - SECRET_KEY=${SECRET_KEY}
    volumes:
      - ./data:/app/data
      - ./knowledge:/app/knowledge:ro
    depends_on:
      livekit:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - meallion-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Elena Voice Agent (LiveKit Worker)
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meallion-agent
    command: ["python", "-m", "src.agents.elena", "start"]
    environment:
      - LIVEKIT_AGENTS_INITIALIZE_TIMEOUT=120
      - LIVEKIT_AGENTS_NUM_IDLE_PROCESSES=1
      - LIVEKIT_AGENTS_LOAD_THRESHOLD=0.9
      - LIVEKIT_LOG_LEVEL=info
      - LIVEKIT_URL=ws://livekit:7880
      - LIVEKIT_PUBLIC_URL=${LIVEKIT_PUBLIC_URL}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - AGENT_LANGUAGE=${AGENT_LANGUAGE:-}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY:-}
      - ELEVEN_API_KEY=${ELEVENLABS_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID:-aTP4J5SJLQl74WTSRXKW}
      - ELEVENLABS_MODEL=${ELEVENLABS_MODEL:-eleven_multilingual_v2}
      - ELEVENLABS_VOICE_STABILITY=${ELEVENLABS_VOICE_STABILITY:-0.45}
      - ELEVENLABS_VOICE_SIMILARITY=${ELEVENLABS_VOICE_SIMILARITY:-0.80}
      - ELEVENLABS_VOICE_SPEED=${ELEVENLABS_VOICE_SPEED:-0.60}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - SHOPIFY_STORE_URL=${SHOPIFY_STORE_URL}
      - SHOPIFY_ACCESS_TOKEN=${SHOPIFY_ACCESS_TOKEN}
      - CLICKUP_API_TOKEN=${CLICKUP_API_TOKEN}
      - CLICKUP_LIST_ID=${CLICKUP_LIST_ID}
      - POSTGRES_URL=${POSTGRES_URL}
    volumes:
      - ./knowledge:/app/knowledge:ro
    depends_on:
      livekit:
        condition: service_healthy
    networks:
      - meallion-network
    restart: unless-stopped

  # LiveKit Server (v1.8.3 - avoids RED codec panic in 1.9.x)
  livekit:
    image: livekit/livekit-server:v1.8.3
    container_name: meallion-livekit
    ports:
      - "7880:7880"       # HTTP/WebSocket (internal + needed for SIP host-network)
      - "7881:7881"       # RTC/TCP
      - "50000-50200:50000-50200/udp"  # RTC/UDP (subset for prod)
    command: --config /livekit.yaml
    volumes:
      - ./livekit/livekit.prod.yaml:/livekit.yaml:ro
    networks:
      - meallion-network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7880"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # LiveKit SIP Bridge - host networking for proper SIP/RTP NAT traversal
  sip:
    image: livekit/sip:latest
    container_name: meallion-sip
    network_mode: host
    command: --config /sip-config.yaml
    environment:
      - LIVEKIT_URL=ws://127.0.0.1:7880
      - LIVEKIT_API_KEY=meallion-livekit
      - LIVEKIT_API_SECRET=a2791c552f996723181b1c5d756aea0697f2ef57b202170e80840bf6adabc1a6
    volumes:
      - ./livekit/sip-config.yaml:/sip-config.yaml:ro
    restart: unless-stopped

  # Redis (for LiveKit and caching)
  redis:
    image: redis:7-alpine
    container_name: meallion-redis
    ports:
      - "127.0.0.1:6379:6379"  # Expose only on localhost for SIP (host networking)
    volumes:
      - redis-data:/data
    networks:
      - meallion-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: meallion-postgres
    expose:
      - "5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-meallion}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - meallion-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-meallion}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Frontend builder (builds React app, then Caddy serves static files)
  frontend-builder:
    image: node:20-alpine
    container_name: meallion-frontend-builder
    working_dir: /app
    command: sh -c "npm ci && npm run build && cp -r dist/* /output/"
    environment:
      - NODE_ENV=production
      - VITE_API_URL=${VITE_API_URL}
    volumes:
      - ./frontend:/app
      - frontend-build:/output
    profiles:
      - build

  # Admin builder
  admin-builder:
    image: node:20-alpine
    container_name: meallion-admin-builder
    working_dir: /app
    command: sh -c "npm ci && npm run build && cp -r dist/* /output/"
    environment:
      - NODE_ENV=production
      - VITE_API_URL=${VITE_API_URL}
    volumes:
      - ./admin:/app
      - admin-build:/output
    profiles:
      - build

networks:
  meallion-network:
    driver: bridge

volumes:
  redis-data:
  postgres-data:
  caddy-data:
  caddy-config:
  frontend-build:
  admin-build:
